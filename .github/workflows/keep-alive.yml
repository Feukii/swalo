name: Keep API Alive

on:
  schedule:
    # Optimisé pour disponibilité 6h-22h UTC+1 (Afrique Centrale)
    # En UTC: 5h-21h
    # Ping toutes les 10 minutes (sous le seuil de 15min de Render)
    #
    # Warm-up matinal à 4h55 UTC (5h55 UTC+1) pour être prêt à 6h
    - cron: '55 4 * * *'
    #
    # Pings réguliers toutes les 10 minutes de 5h à 21h UTC
    - cron: '*/10 5-20 * * *'
    #
    # Dernier ping à 21h UTC (22h UTC+1)
    - cron: '0 21 * * *'
  workflow_dispatch: # Permet le déclenchement manuel

env:
  API_URL: https://swalo-api-prod.onrender.com/api/health
  # URL staging (optionnel - décommenter si service staging séparé)
  # STAGING_API_URL: https://swalo-api-staging.onrender.com/api/health

jobs:
  ping-production:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Production API
        run: |
          echo "Pinging Production API at $(date -u) UTC"
          echo "Local time (UTC+1): $(TZ='Africa/Douala' date)"

          # Retry logic for cold starts (up to 5 attempts with longer timeout)
          max_attempts=5
          attempt=1
          timeout=120  # 2 minutes timeout for cold starts

          while [ $attempt -le $max_attempts ]; do
            echo "Attempt $attempt/$max_attempts (timeout: ${timeout}s)..."

            # Use curl with longer timeout and capture both status and handle timeouts
            response=$(curl -s -o /dev/null -w "%{http_code}" --max-time $timeout --connect-timeout 30 ${{ env.API_URL }} || echo "TIMEOUT")

            if [ "$response" = "200" ]; then
              echo "API is alive (HTTP $response)"
              exit 0
            elif [ "$response" = "502" ] || [ "$response" = "503" ] || [ "$response" = "TIMEOUT" ]; then
              echo "API waking up (Response: $response), waiting 30s before retry..."
              sleep 30
              attempt=$((attempt + 1))
            elif [ "$response" = "000" ]; then
              echo "Connection failed (cold start?), waiting 30s before retry..."
              sleep 30
              attempt=$((attempt + 1))
            else
              echo "Unexpected response: $response"
              exit 1
            fi
          done

          echo "API failed to respond after $max_attempts attempts"
          exit 1

      - name: Log completion
        if: always()
        run: |
          echo "Keep-alive completed at $(date -u) UTC"
          echo "Next ping in ~10 minutes"

