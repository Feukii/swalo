name: Deploy SWALO

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # Test & Build with Turbo Remote Caching
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd apps/api && pnpm exec prisma generate

      - name: Lint
        run: pnpm run lint

      - name: Run Tests
        run: pnpm run test

      - name: Build all packages (with Turbo cache)
        run: |
          pnpm turbo build --filter=@swalo/core
          cd apps/api && pnpm exec prisma generate && pnpm build
          cd ../web && pnpm build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://swalo-api.onrender.com/api' }}

  # Deploy Web to Vercel
  deploy-web:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Check Vercel configuration
        id: vercel_config
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "VERCEL_TOKEN secret not configured, skipping Vercel production deployment..."
            echo "Note: Configure VERCEL_TOKEN/VERCEL_ORG_ID/VERCEL_PROJECT_ID secrets to enable web prod deploy"
          fi

      - name: Deploy to Vercel
        if: steps.vercel_config.outputs.configured == 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./

  # Deploy Mobile to EAS
  deploy-mobile:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: cd apps/mobile && pnpm install

      - name: Build on EAS
        # iOS désactivé tant que les credentials Apple (certificat de distribution)
        # ne sont pas configurés dans EAS. Repasser à --platform all une fois prêt.
        run: cd apps/mobile && eas build --platform android --non-interactive --no-wait

  # Deploy API to Render (automatic via render.yaml)
  notify-render:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

  # Verify API health after deployment
  verify-health:
    needs: notify-render
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Render deployment
        run: sleep 60

      - name: Verify API Health
        run: |
          for i in $(seq 1 10); do
            echo "Health check attempt $i/10..."
            if curl -sf https://swalo-api.onrender.com/api/health; then
              echo ""
              echo "API is healthy!"
              exit 0
            fi
            echo "API not ready, waiting 30s..."
            sleep 30
          done
          echo "API health check failed after 10 attempts"
          exit 1
